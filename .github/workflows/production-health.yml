name: KUER production health

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: read

jobs:
  deep-health:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Require a ready production backend
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error --retry 2 --retry-all-errors --max-time 20 https://studio.mnrv.nl/api/health)"
          node -e 'const body=JSON.parse(process.argv[1]); if(body.status!=="ready") { console.error(body); process.exit(1) }' "$response"
